<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Header / Stats Card -->
        <div class="statsContainer">
            <div class="details">
                <h1>My Tasks</h1>
                <h2 id="motivationText">Let's get things done!</h2>
                <div id="progressBar">
                    <div id="progress"></div>
                </div>
            </div>
            <div class="statsNumber">
                <p id="numbers">0 / 0</p>
            </div>
        </div>

        <!-- Input Form -->
        <form id="taskForm">
            <input id="taskInput" type="text" placeholder="What needs to be done?" autocomplete="off">
            <button id="newTask" type="submit" title="Add task">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </form>

        <!-- Filter Tabs -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <!-- Task List -->
        <ul id="task-list"></ul>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.4">
                <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            <p>No tasks yet. Add one above!</p>
        </div>

        <!-- Clear Completed -->
        <button id="clearCompleted" class="clear-btn" style="display:none;">Clear completed</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
